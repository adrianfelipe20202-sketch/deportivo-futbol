spring.application.name=deportivo-futbol

# Único perfil: Neon (PostgreSQL). Detalle en application-neon.properties.
spring.profiles.active=neon

# Local: 9090. En la nube: variable PORT.
server.port=${PORT:9090}

spring.devtools.livereload.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Requiere NEON_DB_PASSWORD (o spring.datasource.password) para conectar a Neon.
