<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head ('Jugadores — Listado')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Módulo jugadores</p>
        <h1>Plantillas por club</h1>
        <p class="lede">Relación <code>ManyToOne</code> con <code>id_club</code>.</p>
    </header>

    <div class="alert alert-ok" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
    <div class="alert alert-bad" th:if="${mensajeError}" th:text="${mensajeError}"></div>

    <div class="d-flex flex-wrap gap-2 mb-3">
        <a class="btn solid" th:href="@{/jugadores/nuevo}"><i class="fa-solid fa-plus me-2"></i>Nuevo jugador</a>
        <a class="btn ghost" th:href="@{/}"><i class="fa-solid fa-arrow-left me-2"></i>Dashboard</a>
    </div>

    <section class="panel">
        <div class="empty" th:if="${jugadores.isEmpty()}">
            <p>No hay jugadores — <a th:href="@{/jugadores/nuevo}">crear uno</a>.</p>
        </div>
        <div class="table-wrap" th:unless="${jugadores.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Jugador</th>
                    <th>Nº</th>
                    <th>Posición</th>
                    <th>Club</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="j : ${jugadores}">
                    <td class="muted" th:text="${j.id}"></td>
                    <td class="nombre-cell">
                        <span class="bubble"
                              th:text="${j.nombre != null and !j.nombre.isEmpty()} ? ${#strings.toUpperCase(#strings.substring(j.nombre,0,1))} : '?'">?</span>
                        <span th:text="|${j.nombre} ${j.apellido}|"></span>
                    </td>
                    <td><span class="badge badge-ok" th:text="${j.numero}">10</span></td>
                    <td th:text="${j.posicion}"></td>
                    <td th:text="${j.club != null} ? ${j.club.nombre} : '—'"></td>
                    <td><span class="badge badge-warn"><i class="fa-solid fa-shirt me-1"></i>En plantilla</span></td>
                    <td class="tools">
                        <a class="pill-link" th:href="@{/jugadores/{id}/editar(id=${j.id})}"><i class="fa-solid fa-pen me-1"></i>Editar</a>
                        <a class="pill-link danger" th:href="@{/jugadores/{id}/eliminar(id=${j.id})}"
                           onclick="return confirm('¿Eliminar este jugador?');"><i class="fa-solid fa-trash me-1"></i>Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
