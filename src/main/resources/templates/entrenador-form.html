<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head (${editando} ? 'Entrenador — Editar' : 'Entrenador — Nuevo')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Formulario validado</p>
        <h1 th:text="${editando} ? 'Editar entrenador' : 'Nuevo entrenador'">Entrenador</h1>
        <p class="lede">Campos con <code>@NotBlank</code> y <code>@NotNull</code> en la entidad JPA.</p>
    </header>

    <div class="alert alert-bad" th:if="${mensajeError}" th:text="${mensajeError}"></div>

    <article class="panel">
        <form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post" class="stack">
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-md-6 field">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" th:field="*{nombre}" autocomplete="off"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                </div>
                <div class="col-md-6 field">
                    <label for="apellido">Apellido</label>
                    <input id="apellido" type="text" th:field="*{apellido}" autocomplete="off"
                           th:classappend="${#fields.hasErrors('apellido')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="edad">Edad</label>
                    <input id="edad" type="number" th:field="*{edad}" min="18" max="90"
                           th:classappend="${#fields.hasErrors('edad')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('edad')}" th:errors="*{edad}"></small>
                </div>
                <div class="col-md-8 field">
                    <label for="nacionalidad">Nacionalidad</label>
                    <input id="nacionalidad" type="text" th:field="*{nacionalidad}" autocomplete="off"
                           th:classappend="${#fields.hasErrors('nacionalidad')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('nacionalidad')}" th:errors="*{nacionalidad}"></small>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn solid"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                <a class="btn ghost" th:href="@{/entrenadores}">Volver al listado</a>
            </div>
        </form>
    </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
