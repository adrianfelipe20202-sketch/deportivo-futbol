<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head (${editando} ? 'Asociación — Editar' : 'Asociación — Nuevo')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Formulario validado</p>
        <h1 th:text="${editando} ? 'Editar asociación' : 'Nueva asociación'">Asociación</h1>
    </header>

    <article class="panel">
        <form th:action="@{/asociaciones/guardar}" th:object="${asociacion}" method="post" class="stack">
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-12 field">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" th:field="*{nombre}" autocomplete="organization"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                </div>
                <div class="col-md-6 field">
                    <label for="pais">País</label>
                    <input id="pais" type="text" th:field="*{pais}" autocomplete="country-name"
                           th:classappend="${#fields.hasErrors('pais')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('pais')}" th:errors="*{pais}"></small>
                </div>
                <div class="col-md-6 field">
                    <label for="presidente">Presidente</label>
                    <input id="presidente" type="text" th:field="*{presidente}" autocomplete="name"
                           th:classappend="${#fields.hasErrors('presidente')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('presidente')}" th:errors="*{presidente}"></small>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn solid"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                <a class="btn ghost" th:href="@{/asociaciones}">Volver</a>
            </div>
        </form>
    </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
