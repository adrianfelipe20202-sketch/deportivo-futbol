<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head ('Asociaciones — Listado')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Módulo asociaciones</p>
        <h1>Federaciones y asociaciones</h1>
        <p class="lede">Tabla responsiva con badges de ámbito territorial.</p>
    </header>

    <div class="alert alert-ok" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
    <div class="alert alert-bad" th:if="${mensajeError}" th:text="${mensajeError}"></div>

    <div class="d-flex flex-wrap gap-2 mb-3">
        <a class="btn solid" th:href="@{/asociaciones/nuevo}"><i class="fa-solid fa-plus me-2"></i>Nueva asociación</a>
        <a class="btn ghost" th:href="@{/}"><i class="fa-solid fa-arrow-left me-2"></i>Dashboard</a>
    </div>

    <section class="panel">
        <div class="empty" th:if="${asociaciones.isEmpty()}">
            <p>No hay asociaciones — <a th:href="@{/asociaciones/nuevo}">crear una</a>.</p>
        </div>
        <div class="table-wrap" th:unless="${asociaciones.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>País</th>
                    <th>Presidente</th>
                    <th>Ámbito</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${asociaciones}">
                    <td class="muted" th:text="${a.id}"></td>
                    <td th:text="${a.nombre}"></td>
                    <td>
                        <span class="badge badge-ok" th:text="${a.pais}">País</span>
                    </td>
                    <td th:text="${a.presidente}"></td>
                    <td><span class="badge badge-warn"><i class="fa-solid fa-earth-americas me-1"></i>Regional</span></td>
                    <td class="tools">
                        <a class="pill-link" th:href="@{/asociaciones/{id}/editar(id=${a.id})}"><i class="fa-solid fa-pen me-1"></i>Editar</a>
                        <a class="pill-link danger" th:href="@{/asociaciones/{id}/eliminar(id=${a.id})}"
                           onclick="return confirm('¿Eliminar esta asociación?');"><i class="fa-solid fa-trash me-1"></i>Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
