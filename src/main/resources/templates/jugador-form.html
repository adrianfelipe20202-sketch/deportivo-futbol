<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head (${editando} ? 'Jugador — Editar' : 'Jugador — Nuevo')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Formulario validado</p>
        <h1 th:text="${editando} ? 'Editar jugador' : 'Nuevo jugador'">Jugador</h1>
    </header>

    <article class="panel">
        <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post" class="stack">
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-md-6 field">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" th:field="*{nombre}"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                </div>
                <div class="col-md-6 field">
                    <label for="apellido">Apellido</label>
                    <input id="apellido" type="text" th:field="*{apellido}"
                           th:classappend="${#fields.hasErrors('apellido')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="numero">Número</label>
                    <input id="numero" type="number" min="1" max="99" th:field="*{numero}"
                           th:classappend="${#fields.hasErrors('numero')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('numero')}" th:errors="*{numero}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="posicion">Posición</label>
                    <input id="posicion" type="text" th:field="*{posicion}" placeholder="Ej. Delantero"
                           th:classappend="${#fields.hasErrors('posicion')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('posicion')}" th:errors="*{posicion}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="clubSel">Club</label>
                    <select id="clubSel" th:field="*{club.id}"
                            th:classappend="${#fields.hasErrors('club')} ? 'invalid'">
                        <option value="" disabled th:selected="${jugador.club == null or jugador.club.id == null}">Seleccione club</option>
                        <option th:each="cl : ${clubes}" th:value="${cl.id}" th:text="${cl.nombre}"></option>
                    </select>
                    <small class="err" th:if="${#fields.hasErrors('club')}" th:errors="*{club}"></small>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn solid"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                <a class="btn ghost" th:href="@{/jugadores}">Volver</a>
            </div>
        </form>
    </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
