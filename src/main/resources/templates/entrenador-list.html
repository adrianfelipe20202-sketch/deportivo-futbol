<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head ('Entrenadores — Listado')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Módulo entrenadores</p>
        <h1>Listado de entrenadores</h1>
        <p class="lede">Gestión del cuerpo técnico. Estado según asignación a club.</p>
    </header>

    <div class="alert alert-ok" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
    <div class="alert alert-bad" th:if="${mensajeError}" th:text="${mensajeError}"></div>

    <div class="d-flex flex-wrap gap-2 mb-3">
        <a class="btn solid" th:href="@{/entrenadores/nuevo}"><i class="fa-solid fa-plus me-2"></i>Nuevo entrenador</a>
        <a class="btn ghost" th:href="@{/}"><i class="fa-solid fa-arrow-left me-2"></i>Dashboard</a>
    </div>

    <section class="panel">
        <div class="empty" th:if="${entrenadores.isEmpty()}">
            <p>No hay entrenadores — <a th:href="@{/entrenadores/nuevo}">crear el primero</a>.</p>
        </div>
        <div class="table-wrap" th:unless="${entrenadores.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Nacionalidad</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="e : ${entrenadores}">
                    <td class="muted" th:text="${e.id}"></td>
                    <td class="nombre-cell">
                        <span class="bubble"
                              th:text="${e.nombre != null and !e.nombre.isEmpty()} ? ${#strings.toUpperCase(#strings.substring(e.nombre,0,1))} : '?'">?</span>
                        <span th:text="|${e.nombre} ${e.apellido}|"></span>
                    </td>
                    <td th:text="${e.edad}"></td>
                    <td th:text="${e.nacionalidad}"></td>
                    <td>
                        <span class="badge badge-ok" th:if="${entrenadoresOcupadosIds.contains(e.id)}"><i class="fa-solid fa-link me-1"></i>En club</span>
                        <span class="badge badge-muted" th:unless="${entrenadoresOcupadosIds.contains(e.id)}"><i class="fa-solid fa-circle me-1"></i>Libre</span>
                    </td>
                    <td class="tools">
                        <a class="pill-link" th:href="@{/entrenadores/{id}/editar(id=${e.id})}"><i class="fa-solid fa-pen me-1"></i>Editar</a>
                        <a class="pill-link danger" th:href="@{/entrenadores/{id}/eliminar(id=${e.id})}"
                           onclick="return confirm('¿Eliminar este entrenador?');"><i class="fa-solid fa-trash me-1"></i>Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
