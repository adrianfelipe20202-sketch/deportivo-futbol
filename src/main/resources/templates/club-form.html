<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head (${editando} ? 'Club — Editar' : 'Club — Nuevo')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Formulario relacional</p>
        <h1 th:text="${editando} ? 'Editar club' : 'Nuevo club'">Club</h1>
        <p class="lede">Seleccione entrenador libre, asociación y competiciones (ManyToMany).</p>
    </header>

    <article class="panel">
        <form th:action="@{/clubes/guardar}" th:object="${club}" method="post" class="stack">
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-md-6 field">
                    <label for="nombre">Nombre del club</label>
                    <input id="nombre" type="text" th:field="*{nombre}"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                </div>
                <div class="col-md-6 field">
                    <label for="entSel">Entrenador (OneToOne)</label>
                    <select id="entSel" th:field="*{entrenador.id}"
                            th:classappend="${#fields.hasErrors('entrenador')} ? 'invalid'">
                        <option value="" disabled th:selected="${club.entrenador == null or club.entrenador.id == null}">Seleccione</option>
                        <option th:each="e : ${entrenadores}" th:value="${e.id}"
                                th:text="|${e.nombre} ${e.apellido} · ${e.nacionalidad}|"></option>
                    </select>
                    <small class="err" th:if="${#fields.hasErrors('entrenador')}" th:errors="*{entrenador}"></small>
                </div>
                <div class="col-12 field">
                    <label for="asoSel">Asociación (ManyToOne)</label>
                    <select id="asoSel" th:field="*{asociacion.id}"
                            th:classappend="${#fields.hasErrors('asociacion')} ? 'invalid'">
                        <option value="" disabled th:selected="${club.asociacion == null or club.asociacion.id == null}">Seleccione</option>
                        <option th:each="a : ${asociaciones}" th:value="${a.id}" th:text="|${a.nombre} (${a.pais})|"></option>
                    </select>
                    <small class="err" th:if="${#fields.hasErrors('asociacion')}" th:errors="*{asociacion}"></small>
                </div>
                <div class="col-12 field">
                    <label>Competiciones (ManyToMany)</label>
                    <div class="check-grid" th:if="${!competicionesCatalogo.isEmpty()}">
                        <label class="check-pill" th:each="cmp : ${competicionesCatalogo}">
                            <input type="checkbox" name="competicionIds" th:value="${cmp.id}"
                                   th:checked="${competicionesSeleccionadas.contains(cmp.id)}"/>
                            <span th:text="${cmp.nombre}">Torneo</span>
                        </label>
                    </div>
                    <p class="muted mb-0" th:if="${competicionesCatalogo.isEmpty()}">No hay competiciones creadas todavía.</p>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn solid"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                <a class="btn ghost" th:href="@{/clubes}">Volver</a>
            </div>
        </form>
    </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
