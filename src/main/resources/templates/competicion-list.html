<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head ('Competiciones — Listado')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Módulo competiciones</p>
        <h1>Torneos y ligas</h1>
        <p class="lede">Premios y calendario con badges de vigencia.</p>
    </header>

    <div class="alert alert-ok" th:if="${mensajeExito}" th:text="${mensajeExito}"></div>
    <div class="alert alert-bad" th:if="${mensajeError}" th:text="${mensajeError}"></div>

    <div class="d-flex flex-wrap gap-2 mb-3">
        <a class="btn solid" th:href="@{/competiciones/nuevo}"><i class="fa-solid fa-plus me-2"></i>Nueva competición</a>
        <a class="btn ghost" th:href="@{/}"><i class="fa-solid fa-arrow-left me-2"></i>Dashboard</a>
    </div>

    <section class="panel" th:with="today=${T(java.time.LocalDate).now()}">
        <div class="empty" th:if="${competiciones.isEmpty()}">
            <p>No hay competiciones — <a th:href="@{/competiciones/nuevo}">crear una</a>.</p>
        </div>
        <div class="table-wrap" th:unless="${competiciones.isEmpty()}">
            <table>
                <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Premio</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${competiciones}">
                    <td class="muted" th:text="${c.id}"></td>
                    <td th:text="${c.nombre}"></td>
                    <td><span class="badge badge-ok" th:text="|${#numbers.formatDecimal(c.montoPremio, 1, 2)} €|">0 €</span></td>
                    <td th:text="${#temporals.format(c.fechaInicio, 'dd/MM/yyyy')}"></td>
                    <td th:text="${#temporals.format(c.fechaFin, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="badge badge-warn" th:if="${c.fechaFin.isBefore(today)}"><i class="fa-solid fa-flag-checkered me-1"></i>Finalizada</span>
                        <span class="badge badge-ok" th:unless="${c.fechaFin.isBefore(today)}"><i class="fa-solid fa-play me-1"></i>Activa</span>
                    </td>
                    <td class="tools">
                        <a class="pill-link" th:href="@{/competiciones/{id}/editar(id=${c.id})}"><i class="fa-solid fa-pen me-1"></i>Editar</a>
                        <a class="pill-link danger" th:href="@{/competiciones/{id}/eliminar(id=${c.id})}"
                           onclick="return confirm('¿Eliminar esta competición?');"><i class="fa-solid fa-trash me-1"></i>Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
