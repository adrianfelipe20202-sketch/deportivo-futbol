<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head (${editando} ? 'Competición — Editar' : 'Competición — Nuevo')}"></head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar (${activeNav})}"></th:block>

<main class="shell shell-wide">
    <header class="page-head">
        <p class="eyebrow">Formulario validado</p>
        <h1 th:text="${editando} ? 'Editar competición' : 'Nueva competición'">Competición</h1>
    </header>

    <article class="panel">
        <form th:action="@{/competiciones/guardar}" th:object="${competicion}" method="post" class="stack">
            <input type="hidden" th:field="*{id}">
            <div class="row g-3">
                <div class="col-12 field">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" th:field="*{nombre}"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="montoPremio">Monto premio (€)</label>
                    <input id="montoPremio" type="number" step="0.01" min="0" th:field="*{montoPremio}"
                           th:classappend="${#fields.hasErrors('montoPremio')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('montoPremio')}" th:errors="*{montoPremio}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="fechaInicio">Fecha inicio</label>
                    <input id="fechaInicio" type="date" th:field="*{fechaInicio}"
                           th:classappend="${#fields.hasErrors('fechaInicio')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></small>
                </div>
                <div class="col-md-4 field">
                    <label for="fechaFin">Fecha fin</label>
                    <input id="fechaFin" type="date" th:field="*{fechaFin}"
                           th:classappend="${#fields.hasErrors('fechaFin')} ? 'invalid'"/>
                    <small class="err" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></small>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn solid"><i class="fa-solid fa-floppy-disk me-2"></i>Guardar</button>
                <a class="btn ghost" th:href="@{/competiciones}">Volver</a>
            </div>
        </form>
    </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
