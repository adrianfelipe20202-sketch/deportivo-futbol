# =============================================================================
# Perfil Neon (PostgreSQL serverless) — JDBC
# =============================================================================
# Contraseña: NUNCA en el repo. Define NEON_DB_PASSWORD (PowerShell de la sesión
# o variables de entorno de usuario en Windows). Si publicaste la URI, rota la
# contraseña en el panel de Neon.
# Para otra URL (otro branch/host), usa --spring.datasource.url="..." al arrancar.
# En la URL JDBC usamos ";" entre params: en CMD/PowerShell "&" corta el comando.
# =============================================================================

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${NEON_DB_USER:neondb_owner}
spring.datasource.password=${NEON_DB_PASSWORD}
# Sin channelBinding: en algunos Windows/Java el driver falla al negociar SSL (SslMode).
spring.datasource.url=jdbc:postgresql://ep-lingering-glitter-ap6kg8a1-pooler.c-7.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
# Neon cierra conexiones idle en el proxy; sin esto el pool reusa sockets muertos y "pierde" la BD hasta reiniciar.
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
